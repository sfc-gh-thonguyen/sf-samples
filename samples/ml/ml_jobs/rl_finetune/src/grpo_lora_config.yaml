# GRPO LoRA Training Configuration for Snowflake SPCS
# Two-node decoupled setup: 8 GPUs total (4 per node)
#   - Node 1: 2 GPUs for SGLang inference (d2p1t1) - reduced due to SPCS cross-node limit
#   - Node 2: 4 GPUs for training (d4p1t1)
#
# Using GSM8K dataset for testing AReaL in SPCS
# NOTE: Reduced SGLang dp from 4 to 2 because SPCS limits cross-pod HTTP connections

experiment_name: gsm8k-spcs-test
trial_name: v1

seed: 1
enable_offload: false
total_train_epochs: 1
tokenizer_path: ${actor.path}

# Two nodes with 4 GPUs each
cluster:
  n_nodes: 2
  n_gpus_per_node: 4
  fileroot: /mnt/job_stage/checkpoints/${experiment_name}/${trial_name}
  name_resolve:
    type: nfs
    nfs_record_root: /mnt/job_stage/name_resolve/${experiment_name}/${trial_name}

# Decoupled mode: SGLang inference on node 1, training on node 2
# Format: sglang:d<dp>p<pp>t<tp>+d<dp>p<pp>t<tp>
#   - First part (sglang:d1p1t4): 1 inference server with tp=4 (4 GPUs total)
#   - Second part (+d4p1t1): 4 data parallel training processes
# WORKAROUND: Only 1 SGLang server because SPCS seems to limit cross-node HTTP to 1 connection
allocation_mode: sglang:d1p1t4+d4p1t1

scheduler:
  type: null

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 64
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  pause_grace_period: 1.0
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 600.0
  request_timeout: 900.0
  use_lora: true

gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 512
  greedy: false
  temperature: 1.0
  lora_name: "lora-gsm8k"

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-0.6B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer:
    type: adam
    lr: 1.7e-4
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  weight_update_mode: disk
  use_lora: ${rollout.use_lora}
  peft_type: lora
  lora_rank: 16
  lora_alpha: 16
  target_modules: [all-linear]
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 12
      cmd: python3 -m areal.scheduler.rpc.rpc_server
      env_vars: {}

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang config for rollout
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 4096
  mem_fraction_static: 0.8
  enable_torch_compile: false
  disable_cuda_graph: true
  enable_lora: ${rollout.use_lora}
  lora_paths: []

# vLLM config for rollout
vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 4096
  gpu_memory_utilization: 0.8
  enable_lora: ${rollout.use_lora}
  lora_modules: '{"name": "${gconfig.lora_name}", "path": "./model/lora", "base_model_name": "${actor.path}"}'
  enforce_eager: true

# Datasets - using GSM8K from HuggingFace
train_dataset:
  batch_size: 32
  shuffle: true
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 32
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl
  max_length: 1024

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
