# GRPO LoRA Training Configuration for Snowflake SPCS
# Single-node setup: 4 GPUs total (multi-node Ray broken in SPCS)
#   - 2 GPUs for SGLang inference (tp=2)
#   - 2 GPUs for training (dp=2)
#
# Using GSM8K dataset for testing AReaL in SPCS

experiment_name: gsm8k-spcs-test
trial_name: v23

seed: 1
enable_offload: false
total_train_epochs: 3
tokenizer_path: ${actor.path}

# Single node with 4 GPUs (multi-node Ray broken in SPCS)
cluster:
  n_nodes: 1
  n_gpus_per_node: 4
  fileroot: /mnt/job_stage/checkpoints/${experiment_name}/${trial_name}
  name_resolve:
    type: nfs
    nfs_record_root: /mnt/job_stage/name_resolve/${experiment_name}/${trial_name}

# Single-node setup: 2 GPUs for SGLang (tp=2) + 2 GPUs for training (dp=2)
# Format: sglang:d<dp>p<pp>t<tp>+d<dp>p<pp>t<tp>
allocation_mode: sglang:d1p1t2+d2p1t1

scheduler:
  type: null

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  # Enable rollout tracing to capture detailed metrics
  enable_rollout_tracing: true
  pause_grace_period: 1.0
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 600.0
  request_timeout: 900.0
  use_lora: true

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 1024
  greedy: false
  temperature: 1.0
  lora_name: "lora-gsm8k"

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-0.6B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer:
    type: adam
    lr: 5e-4  # Increased from 2e-4 - grad norms are small (~0.07), need higher LR
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.05
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  # GRPO uses group-relative advantages, no KL penalty needed
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  weight_update_mode: disk
  use_lora: ${rollout.use_lora}
  peft_type: lora
  lora_rank: 16
  lora_alpha: 32  # Increased from 16 - scaling factor now 2.0 for stronger LoRA effect
  # Must match SGLang's --lora-target-modules (q_proj, k_proj, v_proj, o_proj)
  # Using all-linear causes mismatch when loading LoRA into SGLang
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 12
      cmd: python3 -m areal.scheduler.rpc.rpc_server
      env_vars: {}

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang config for rollout
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 4096
  mem_fraction_static: 0.8
  enable_torch_compile: false
  disable_cuda_graph: true
  enable_lora: ${rollout.use_lora}
  # LoRA memory pool configuration - REQUIRED for dynamic adapter loading
  # Without these, SGLang rejects dynamically loaded LoRA adapters
  max_lora_rank: 16
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj]
  lora_paths: []

# vLLM config for rollout
vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 4096
  gpu_memory_utilization: 0.8
  enable_lora: ${rollout.use_lora}
  lora_modules: '{"name": "${gconfig.lora_name}", "path": "./model/lora", "base_model_name": "${actor.path}"}'
  enforce_eager: true

# Datasets - using GSM8K from HuggingFace
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 1
  path: openai/gsm8k
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 16
  pin_memory: true
  num_workers: 1
  path: openai/gsm8k
  type: rl
  max_length: 1024

saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
    project: spcs-areal
    entity: null

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
