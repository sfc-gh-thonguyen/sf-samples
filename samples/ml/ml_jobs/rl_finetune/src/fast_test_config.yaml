# GRPO LoRA Training - Fast Test Config
# Minimal setup for testing SPCS cross-node weight sync

experiment_name: math-test
trial_name: v1

seed: 1
enable_offload: false
total_train_epochs: 1
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 2
  n_gpus_per_node: 4
  fileroot: /mnt/job_stage/checkpoints/${experiment_name}/${trial_name}
  name_resolve:
    type: nfs
    nfs_record_root: /mnt/job_stage/name_resolve/${experiment_name}/${trial_name}

# Decoupled: SGLang on node 1 (tp=4), Training on node 2 (dp=2 to reduce memory)
allocation_mode: sglang:d1p1t4+d2p1t1

scheduler:
  type: null

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 16
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  pause_grace_period: 1.0
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 600.0
  request_timeout: 900.0
  use_lora: true

gconfig:
  n_samples: 2
  min_new_tokens: 0
  max_new_tokens: 64
  greedy: false
  temperature: 1.0
  lora_name: "lora-math"

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-0.6B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 2048
  optimizer:
    type: adam
    lr: 1e-4
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.0
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: 0.0
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}
  weight_update_mode: disk
  use_lora: ${rollout.use_lora}
  peft_type: lora
  lora_rank: 16
  lora_alpha: 16
  target_modules: [all-linear]
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      cpu: 4
      mem: 12
      cmd: python3 -m areal.scheduler.rpc.rpc_server
      env_vars: {}

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 2048
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang config
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 1024
  mem_fraction_static: 0.8
  enable_torch_compile: false
  disable_cuda_graph: true
  enable_lora: ${rollout.use_lora}
  lora_paths: []

# vLLM config (not used, but required)
vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 1024
  gpu_memory_utilization: 0.8
  enable_lora: ${rollout.use_lora}
  lora_modules: '{"name": "${gconfig.lora_name}", "path": "./model/lora", "base_model_name": "${actor.path}"}'
  enforce_eager: true

# Minimal dataset config (not used by simple_math_trainer, but required by AReaL)
train_dataset:
  batch_size: 4
  shuffle: true
  pin_memory: true
  num_workers: 0
  path: null
  type: rl
  max_length: 256

valid_dataset:
  batch_size: 4
  pin_memory: true
  num_workers: 0
  path: null
  type: rl
  max_length: 256

# Saver/Recover/Evaluator configs
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null
  tensorboard: false
  wandb: false
