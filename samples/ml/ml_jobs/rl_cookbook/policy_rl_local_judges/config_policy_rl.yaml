# Policy RL Training — Customer Interaction Summarization (Local Judge)
#
# Trains Qwen3-1.7B to internalize a summarization policy via RL.
# Decomposed reward: deterministic checks + local vLLM judge (Qwen3-8B).
#
# GPU layout (8x A100-40GB):
#   Phase 1 (ENABLE_LLM_JUDGE=0): all 8 GPUs for AReaL (4 rollout dp=4 + 4 training dp=4)
#   Phase 2 (ENABLE_LLM_JUDGE=1): GPUs 0-3 AReaL + GPUs 4-7 judges (change to d2p1t1+d2p1t1, n_gpus=4)
# No Cortex API dependency — judge runs locally with round-robin load balancing.

experiment_name: policy-rl-summarization
trial_name: local_judge_v29

seed: 1
enable_offload: false
total_train_epochs: 30
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 1
  n_gpus_per_node: 8
  fileroot: /tmp/areal_local_judge_v29
  name_resolve:
    type: ray
    ray_actor_name: areal_kv_store

# Phase 1 GPU allocation: 4 vLLM rollout (dp=4, tp=1) + 4 FSDP training (dp=4) = 8 GPUs
# All 8 GPUs for AReaL, no judge servers.
allocation_mode: vllm:d4p1t1+d4p1t1

scheduler:
  type: ray

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 24
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 4
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 600.0
  request_timeout: 600.0
  pause_grace_period: 1.0
  use_lora: false

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 1200
  greedy: false
  temperature: 1.0

# Actor (policy model) — Qwen3-1.7B
actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-1.7B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  attn_impl: flash_attention_2
  mb_spec:
    max_tokens_per_mb: 6144
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.05
  eps_clip: 0.2
  eps_clip_higher: 0.28
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.05
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  reward_norm:
    mean_level: batch
    std_level: batch
    group_size: 8
  adv_norm:
    mean_level: batch
    std_level: batch
    group_size: 8
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - cpu: 4
      gpu: 1
      mem: 10
  use_lora: false
  weight_update_mode: xccl

# Reference model (for KL penalty)
ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  disable_dropout: true
  dtype: ${actor.dtype}
  attn_impl: flash_attention_2
  mb_spec:
    max_tokens_per_mb: 6144
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# vLLM inference server (for rollout generation, NOT judging)
vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 6144
  gpu_memory_utilization: 0.85

# Datasets
# Loaded directly by load_policy_dataset() in run_policy_rl.py,
# which queries Snowflake tables via REST API (no local files).
# The "path" field holds the table name (used by load_policy_dataset).
train_dataset:
  batch_size: 64
  shuffle: true
  pin_memory: true
  num_workers: 2
  path: POLICY_RL_TRAIN
  type: rl
  max_length: 3072

valid_dataset:
  batch_size: 32
  pin_memory: true
  num_workers: 2
  path: POLICY_RL_EVAL
  type: rl

# Checkpointing
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: "off"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

# Logging
stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
    project: spcs-policy-rl

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
