# GRPO Training Configuration for SPCS
# 
# Single-node setup: 4 GPUs
#   - 2 GPUs for vLLM inference (tp=1 each, dp=2)
#   - 2 GPUs for FSDP training (dp=2)

experiment_name: gsm8k-spcs-sc
trial_name: vr_mljob_v1

seed: 1
enable_offload: false
total_train_epochs: 1
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 1
  n_gpus_per_node: 4
  fileroot: /tmp/areal_vr_mljob_v1
  name_resolve:
    type: ray
    ray_actor_name: areal_kv_store

# GPU allocation: 2 vLLM (dp=2, tp=1) + 2 training (dp=2)
allocation_mode: vllm:d2p1t1+d2p1t1

scheduler:
  type: ray

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 0
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true
  setup_timeout: 600.0
  request_timeout: 900.0
  pause_grace_period: 1.0
  use_lora: false

gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 512
  greedy: false
  temperature: 1.0
  lora_name: "lora-gsm8k"

# Actor (policy model) configuration
actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-0.6B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  
  # IMPORTANT: Use flash_attention_2 for packed sequences
  # SDPA and eager ignore cu_seqlens boundaries
  attn_impl: flash_attention_2
  
  mb_spec:
    max_tokens_per_mb: 4096
  
  optimizer:
    type: adam
    lr: 1.5e-5
    weight_decay: 0.017
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.05
  
  eps_clip: 0.2
  eps_clip_higher: 0.28
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  
  reward_norm:
    mean_level: batch
    std_level: batch
    group_size: 8
  adv_norm:
    mean_level: batch
    std_level: batch
    group_size: 8
  
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - cpu: 4
      gpu: 1
      mem: 10
  
  use_lora: false
  weight_update_mode: xccl

# Reference model (only used if kl_ctl > 0)
ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  disable_dropout: true
  dtype: ${actor.dtype}
  attn_impl: flash_attention_2
  mb_spec:
    max_tokens_per_mb: 4096
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# SGLang inference server (used with sglang allocation)
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 4096
  mem_fraction_static: 0.85
  enable_torch_compile: false
  disable_cuda_graph: true
  attention_backend: flashinfer
  enable_lora: false
  max_lora_rank: 16

# vLLM inference server (used with vllm allocation)
vllm:
  model: ${actor.path}
  seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_model_len: 4096
  gpu_memory_utilization: 0.85

# Datasets
train_dataset:
  batch_size: 64
  shuffle: true
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 64
  pin_memory: true
  num_workers: 2
  path: openai/gsm8k
  type: rl

# Checkpointing
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 50
  freq_secs: null

recover:
  mode: "off"  # Quote to avoid YAML boolean interpretation
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 50
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

# Logging
stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online
    project: spcs-areal

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
